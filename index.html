<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>🧩 拼图单机版 - 三图切换</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; touch-action: none; }
        .game-header { width: 100%; max-width: 450px; padding: 15px 20px 5px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .game-title { font-size: 22px; font-weight: bold; color: #f39c12; text-shadow: 0 0 10px rgba(243,156,18,0.3); }
        .step-counter { font-size: 16px; background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; backdrop-filter: blur(10px); }
        .image-tabs { display: flex; gap: 10px; margin-top: 8px; justify-content: center; width: 92vw; max-width: 430px; }
        .img-tab { width: 55px; height: 55px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: all 0.3s; background-size: cover; background-position: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .img-tab.active { border-color: #f39c12; transform: scale(1.1); box-shadow: 0 0 20px rgba(243,156,18,0.4); }
        .img-tab:active { transform: scale(0.95); }
        .game-container { position: relative; width: 92vw; max-width: 430px; aspect-ratio: 1; margin: 10px auto; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.1); }
        .puzzle-board { position: relative; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 3px; background: #0f0f23; border-radius: 12px; overflow: hidden; }
        .tile { position: relative; width: 100%; height: 100%; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); overflow: hidden; border-radius: 6px; background-size: cover; background-position: center; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
        .tile.empty { background: #0f0f23 !important; cursor: default; box-shadow: inset 0 0 20px rgba(255,255,255,0.05); }
        .tile.empty::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 30%; height: 30%; border: 2px dashed rgba(255,255,255,0.2); border-radius: 4px; }
        .tile.correct { box-shadow: inset 0 0 0 2px #2ecc71, 0 0 10px rgba(46,204,113,0.3); }
        .tile-number { position: absolute; top: 3px; left: 3px; background: rgba(0,0,0,0.7); color: #fff; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: bold; z-index: 10; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .tile:active { transform: scale(0.92); }
        .controls { width: 92vw; max-width: 430px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; padding: 0 5px; }
        .btn { padding: 14px 10px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: #fff; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-info { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; animation: fadeIn 0.4s; backdrop-filter: blur(10px); }
        .win-overlay.show { display: flex; }
        .win-text { color: #f39c12; font-size: 38px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 30px rgba(243,156,18,0.5); animation: bounce 1.2s infinite; }
        .win-subtext { color: #fff; font-size: 18px; margin-bottom: 10px; opacity: 0.9; }
        .win-image { width: 200px; height: 200px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; }
        .preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 999; animation: fadeIn 0.3s; }
        .preview-overlay.show { display: flex; }
        .preview-img { max-width: 90vw; max-height: 65vh; border-radius: 16px; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
        .preview-hint { margin-top: 20px; color: rgba(255,255,255,0.7); font-size: 15px; padding: 10px 25px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        .hint-text { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 10px; text-align: center; }
        .difficulty-selector { display: flex; gap: 8px; margin-top: 6px; justify-content: center; }
        .diff-btn { padding: 5px 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; border-radius: 15px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .diff-btn.active { background: #f39c12; border-color: #f39c12; color: #1a1a2e; font-weight: bold; }
        .diff-btn:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>

};

const ALL_IMAGES = [IMAGES_0, IMAGES_1, IMAGES_2];

class PuzzleGame {
    constructor() {
        this.size = 4;
        this.board = [];
        this.emptyPos = { row: 3, col: 3 };
        this.steps = 0;
        this.isWon = false;
        this.showNums = true;
        this.isDragging = false;
        this.startX = 0; this.startY = 0;
        this.startRow = 0; this.startCol = 0;
        this.startTime = 0;
        this.currentImageIdx = 0;
        this.currentImages = ALL_IMAGES[0];
        this.boardElement = document.getElementById('puzzleBoard');
        this.stepElement = document.getElementById('stepCount');
        this.winOverlay = document.getElementById('winOverlay');
        this.previewOverlay = document.getElementById('previewOverlay');
        this.previewImg = document.getElementById('previewImg');
        this.winImage = document.getElementById('winImage');
        this.init();
    }
    init() {
        this.setupImageTabs();
        this.initBoard();
        this.render();
        this.setupEvents();
    }
    setupImageTabs() {
        const tabs = document.getElementById('imageTabs');
        tabs.addEventListener('click', (e) => {
            if (e.target.classList.contains('img-tab')) {
                const idx = parseInt(e.target.dataset.img);
                if (idx !== this.currentImageIdx) {
                    document.querySelectorAll('.img-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    this.currentImageIdx = idx;
                    this.currentImages = ALL_IMAGES[idx];
                    this.restart();
                }
            }
        });
    }
    setDifficulty(size) {
        this.size = size;
        document.querySelectorAll('.diff-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', [3,4,5][idx] === size);
        });
        this.restart();
    }
    initBoard() {
        let arr = [];
        for (let i = 1; i < this.size * this.size; i++) arr.push(i);
        arr.push(0);
        do { this.shuffleArray(arr); }
        while (!this.isSolvable(arr) || this.isComplete(arr));
        this.board = [];
        for (let i = 0; i < this.size; i++) {
            this.board[i] = [];
            for (let j = 0; j < this.size; j++) {
                this.board[i][j] = arr[i * this.size + j];
                if (arr[i * this.size + j] === 0) this.emptyPos = { row: i, col: j };
            }
        }
        this.steps = 0; this.isWon = false;
        this.startTime = Date.now();
        this.updateSteps();
    }
    shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    isSolvable(arr) {
        let inv = 0;
        const flat = arr.filter(x => x !== 0);
        for (let i = 0; i < flat.length; i++)
            for (let j = i + 1; j < flat.length; j++)
                if (flat[i] > flat[j]) inv++;
        if (this.size % 2 === 1) return inv % 2 === 0;
        const emptyRow = Math.floor(arr.indexOf(0) / this.size);
        return (inv + emptyRow) % 2 === 1;
    }
    isComplete(arr) {
        for (let i = 0; i < arr.length - 1; i++) if (arr[i] !== i + 1) return false;
        return arr[arr.length - 1] === 0;
    }
    render() {
        this.boardElement.innerHTML = '';
        this.boardElement.style.gridTemplateColumns = `repeat(${this.size}, 1fr)`;
        this.boardElement.style.gridTemplateRows = `repeat(${this.size}, 1fr)`;
        for (let row = 0; row < this.size; row++) {
            for (let col = 0; col < this.size; col++) {
                const value = this.board[row][col];
                const tile = document.createElement('div');
                tile.className = 'tile' + (value === 0 ? ' empty' : '');
                tile.dataset.row = row; tile.dataset.col = col; tile.dataset.value = value;
                if (value !== 0) {
                    tile.style.backgroundImage = `url(${this.currentImages[value]})`;
                    if (this.showNums) {
                        const num = document.createElement('div');
                        num.className = 'tile-number'; num.textContent = value;
                        tile.appendChild(num);
                    }
                    if (this.size === 4) {
                        const cr = Math.floor((value - 1) / 4), cc = (value - 1) % 4;
                        if (cr === row && cc === col) tile.classList.add('correct');
                    }
                }
                this.boardElement.appendChild(tile);
            }
        }
    }
    setupEvents() {
        this.boardElement.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: false });
        this.boardElement.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        this.boardElement.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: false });
        this.boardElement.addEventListener('mousedown', (e) => this.handleMouseDown(e));
        this.boardElement.addEventListener('mouseup', (e) => this.handleMouseUp(e));
        this.boardElement.addEventListener('mouseleave', () => { this.isDragging = false; });
        document.addEventListener('keydown', (e) => this.handleKey(e));
        document.addEventListener('touchmove', (e) => { if (e.target.closest('.puzzle-board')) e.preventDefault(); }, { passive: false });
    }
    getTileFromPoint(x, y) {
        const el = document.elementFromPoint(x, y);
        return el ? el.closest('.tile') : null;
    }
    handleTouchStart(e) {
        if (this.isWon) return;
        const touch = e.touches[0];
        const tile = this.getTileFromPoint(touch.clientX, touch.clientY);
        if (tile && !tile.classList.contains('empty')) {
            this.isDragging = true;
            this.startX = touch.clientX; this.startY = touch.clientY;
            this.startRow = parseInt(tile.dataset.row); this.startCol = parseInt(tile.dataset.col);
        }
    }
    handleTouchEnd(e) {
        if (!this.isDragging || this.isWon) { this.isDragging = false; return; }
        const touch = e.changedTouches[0];
        const dx = touch.clientX - this.startX, dy = touch.clientY - this.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 20) {
            let dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
            this.moveByDirection(this.startRow, this.startCol, dir);
        }
        this.isDragging = false;
    }
    handleMouseDown(e) {
        if (this.isWon) return;
        const tile = e.target.closest('.tile');
        if (tile && !tile.classList.contains('empty')) {
            this.isDragging = true;
            this.startX = e.clientX; this.startY = e.clientY;
            this.startRow = parseInt(tile.dataset.row); this.startCol = parseInt(tile.dataset.col);
        }
    }
    handleMouseUp(e) {
        if (!this.isDragging || this.isWon) { this.isDragging = false; return; }
        const dx = e.clientX - this.startX, dy = e.clientY - this.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 20) {
            let dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
            this.moveByDirection(this.startRow, this.startCol, dir);
        }
        this.isDragging = false;
    }
    handleKey(e) {
        if (this.isWon) return;
        const km = { 'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right', 'w':'up','s':'down','a':'left','d':'right', 'W':'up','S':'down','A':'left','D':'right' };
        if (km[e.key]) { e.preventDefault(); this.moveEmpty(km[e.key]); }
    }
    moveByDirection(row, col, dir) {
        let tr = row, tc = col;
        if (dir === 'up') tr--; else if (dir === 'down') tr++; else if (dir === 'left') tc--; else if (dir === 'right') tc++;
        if (tr === this.emptyPos.row && tc === this.emptyPos.col) this.swap(row, col, tr, tc);
    }
    moveEmpty(dir) {
        let tr = this.emptyPos.row, tc = this.emptyPos.col;
        if (dir === 'up') tr++; else if (dir === 'down') tr--; else if (dir === 'left') tc++; else if (dir === 'right') tc--;
        if (tr >= 0 && tr < this.size && tc >= 0 && tc < this.size) this.swap(this.emptyPos.row, this.emptyPos.col, tr, tc);
    }
    swap(r1, c1, r2, c2) {
        [this.board[r1][c1], this.board[r2][c2]] = [this.board[r2][c2], this.board[r1][c1]];
        if (this.board[r1][c1] === 0) this.emptyPos = { row: r1, col: c1 };
        else this.emptyPos = { row: r2, col: c2 };
        this.steps++; this.updateSteps(); this.render();
        if (this.checkWin()) this.handleWin();
    }
    updateSteps() { this.stepElement.textContent = this.steps; }
    checkWin() {
        let exp = 1;
        for (let r = 0; r < this.size; r++)
            for (let c = 0; c < this.size; c++) {
                if (r === this.size - 1 && c === this.size - 1) return this.board[r][c] === 0;
                if (this.board[r][c] !== exp) return false;
                exp++;
            }
        return true;
    }
    handleWin() {
        this.isWon = true;
        document.getElementById('finalSteps').textContent = this.steps;
        document.getElementById('finalDiff').textContent = `${this.size}×${this.size}`;
        this.winImage.src = this.currentImages.all;
        this.winOverlay.classList.add('show');
    }
    closeWin() { this.winOverlay.classList.remove('show'); this.restart(); }
    showPreview() { this.previewImg.src = this.currentImages.all; this.previewOverlay.classList.add('show'); }
    hidePreview() { this.previewOverlay.classList.remove('show'); }
    restart() { this.initBoard(); this.render(); }
    autoWin() {
        let exp = 1;
        for (let r = 0; r < this.size; r++)
            for (let c = 0; c < this.size; c++) {
                if (r === this.size - 1 && c === this.size - 1) { this.board[r][c] = 0; this.emptyPos = { row: r, col: c }; }
                else this.board[r][c] = exp++;
            }
        this.steps = 0; this.updateSteps(); this.render();
        setTimeout(() => this.handleWin(), 300);
    }
    toggleNumbers() { this.showNums = !this.showNums; this.render(); }
}
const game = new PuzzleGame();
</script>
